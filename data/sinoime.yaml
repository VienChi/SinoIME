# Cấu hình SinoIME
# encoding: utf-8

config_version: '1.0'

# các lựa chọn: last | default | _custom_
# last: bố cục bàn phím Latinh được dùng lần gần nhất
# default: bố cục bàn phím US (ABC)
# _custom_: bố cục bàn phím tùy chọn, ví dụ 'com.apple.keylayout.USExtended' hoặc đơn giản là 'USExtended'
keyboard_layout: last

# dành cho người gõ phím chập (chord) kỳ cựu
chord_duration: 0.1  # đơn vị giây

# các lựa chọn: always | never | appropriate
show_notifications_when: appropriate

# Biểu tượng trạng thái trên thanh menu.
#   show — có hiển thị biểu tượng hay không; đặt false để thanh menu gọn gàng hơn.
# Chữ trên biểu tượng là nhãn trạng thái rút gọn của schema cho ascii_mode (qua
# get_state_label_abbreviated). Schema khai báo `abbrev: [中, Ａ]` sẽ dùng ký hiệu
# gọn; nếu không, giá trị `states:` của schema sẽ được dùng nguyên văn.
# Mặc định là "中" / "Ａ" khi schema không khai báo `states:`.
status_icon:
  show: true

style:
  color_scheme: native
  # Tùy chọn: khai báo cả bảng màu sáng và tối để khớp với giao diện hệ thống
  #color_scheme: solarized_light
  #color_scheme_dark: solarized_dark

  # horizontal đã bị loại bỏ (deprecated) từ bản 0.36, SinoIME 0.15, và gỡ bỏ hẳn từ 1.0.1
  candidate_list_layout: stacked  # stacked | linear
  text_orientation: horizontal  # horizontal | vertical
  inline_preedit: true
  # Có nhúng ứng viên đã chọn thành văn bản ngay trong ô nhập hay không
  inline_candidate: false
  # Có ghim thanh ứng viên vào mép màn hình để giảm hiện tượng nhảy vị trí hay không
  memorize_size: true
  # Các màu trong suốt có chồng lên nhau hay không
  mutual_exclusive: false
  # Có dùng nền mờ (translucent) hay không. Chỉ thấy rõ khi màu nền có độ trong suốt
  translucency: false
  # Bật để hiện mũi tên nhỏ báo hiệu có thể lật trang lên/xuống hay không
  show_paging: false

  corner_radius: 7
  hilited_corner_radius: 0
  border_height: -2
  border_width: -2
  # Khoảng cách giữa các ứng viên khi xếp theo kiểu stacked
  line_spacing: 5
  # Khoảng cách giữa preedit và ứng viên khi không ở chế độ inline
  spacing: 8
  # Số lớn hơn 0 sẽ vẽ bóng đổ quanh ứng viên đang được tô sáng
  shadow_size: 0
  # Điều chỉnh kích thước nền của ứng viên không được tô sáng, so với ứng viên được tô sáng
  # Giá trị âm là thu nhỏ, giá trị dương là mở rộng
  #surrounding_extra_expansion: 0

  # định dạng dùng %@ và %c đã lỗi thời (deprecated) từ bản 1.0, SinoIME 1.0
  # %@ sẽ tự động được thay bằng "[ứng viên] [chú thích]"
  # còn %c sẽ được thay bằng "[nhãn]"
  candidate_format: '[label]. [candidate] [comment]'

  # điều chỉnh đường cơ sở (baseline) của chữ
  #base_offset: 0
  font_face: 'Avenir'
  font_point: 16
  #label_font_face: 'Avenir'
  #label_font_point: 12
  #comment_font_face: 'Avenir'
  #comment_font_point: 16

